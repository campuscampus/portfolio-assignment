<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }

        .card img {
            width: 60px;
            height: 60px;
        }
    </style>
</head>
<body>
    <h1>GitHub User Search</h1>

    <form id="search-form">
        <input id="search-input" type="text" placeholder="Search GitHub users">
        <button type="submit">Search</button>
    </form>

    <p id="status"></p>
    <div id="results"></div>

    <script src="scripts.js"></script>
</body>
</html>
